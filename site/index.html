<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>change fabric</title>
    <meta
      name="description"
      content="change fabric is a dockerized local release-quality gate: k6 load, axe-core accessibility, OWASP ZAP, and browserless responsive UX, driven by one CHANGE.md per repo."
    />
    <script>
      // Apply a stored theme choice before first paint to avoid a flash of the
      // wrong theme. No stored choice means follow prefers-color-scheme via CSS.
      (function () {
        try {
          var t = localStorage.getItem("cf-theme");
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
