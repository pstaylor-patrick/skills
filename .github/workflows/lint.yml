name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  no-emdash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/lint-no-emdash.sh

  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check

  pst-context:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/pst-context
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: services/pst-context/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Lint (max-warnings=0)
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Test with coverage (>= 80%)
        run: pnpm test:coverage
      - name: Prettier format check
        run: npx prettier --check .
